<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.active { max-height: 1200px; transition: max-height 0.5s ease-in; }
        .rotate-180 { transform: rotate(180deg); }
        
        /* Sparkle effect for AI */
        @keyframes sparkle { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .animate-sparkle { animation: sparkle 1.5s infinite; }
        
        /* Loading Spinner */
        .loader { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #ffffff; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Gradient Progress Bar Semantic (Red -> Yellow -> Green) */
        .semantic-gradient {
            background: linear-gradient(90deg, #ef4444 0%, #fbbf24 50%, #22c55e 100%);
        }

        /* Header Gradient for Supervisor (Professional Blue/Indigo) */
        .header-gradient {
            background: linear-gradient(135deg, #1e3a8a, #4f46e5);
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="app-root" class="app-container relative pb-10"></div>

<script>
    /* ======================================================================
       DỮ LIỆU CẤU HÌNH (SUPERVISOR DATA)
       ====================================================================== */

                items: [
                    "<strong>Bắt lỗi thật:</strong> Không kiểm tra hình thức, ghi nhận đúng bộ phận, đúng sự việc và có căn cứ.",

            ],

        },

                ],

            {

                    "Ghi nhận và xử lý đủ lỗi sai order, sai bàn, thiếu món.",
                    "Chấn chỉnh thái độ, tụ tập, dùng điện thoại sai mục đích."
                ],
                negatives: ["Điểm bình quân bộ phận Phục vụ dưới 90%."],
                alert: null
            },
            {
                icon: "🏃", title: "Kiểm soát Runner", reward: "1.000.000đ",
                positives: [
                    "Kiểm tra kho bia, gọi NPP kịp thời, tủ bia luôn đủ nhiệt độ.",

                ],

                negatives: ["Để toilet dơ hoặc nguy cơ mất an toàn kéo dài."],

        ],
        kpiScale: [
            { percent: "Nhận 100% KPI", pv: "≥ 36 Lỗi", runner: "≥ 20 Lỗi", tv: "≥ 33 Lỗi", highlight: "green" },
            { percent: "Nhận 90% KPI", pv: "33 – 35 Lỗi", runner: "18 – 19 Lỗi", tv: "30 – 32 Lỗi" },
            { percent: "Nhận 70% KPI", pv: "28 – 32 Lỗi", runner: "15 – 17 Lỗi", tv: "25 – 29 Lỗi" },
            { percent: "Nhận 50% KPI", pv: "22 – 27 Lỗi", runner: "12 – 14 Lỗi", tv: "20 – 24 Lỗi" },
            { percent: "Nhận 30% KPI", pv: "16 – 21 Lỗi", runner: "8 – 11 Lỗi", tv: "14 – 19 Lỗi" },
            { percent: "Nhận 0% KPI (Cảnh báo)", pv: "≤ 15 Lỗi", runner: "≤ 7 Lỗi", tv: "≤ 13 Lỗi", highlight: "red" }
        ],
        rules: [
            "<strong>Cross-Check Logic:</strong> Muốn có KPI thì Giám sát phải kiểm tra thật, bắt lỗi thật và trừ KPI nhân viên thật.",

    /* ======================================================================

                                    <tr class="text-slate-700 font-bold border-b border-slate-100">
                                        <th class="py-3 px-2 border-r border-slate-100 text-left whitespace-nowrap">TỶ LỆ KPI NHẬN ĐƯỢC</th>
                                        <th class="py-3 px-2">PHỤC VỤ<br><span class="text-[8px] sm:text-[9px] font-normal text-slate-400">(QUỸ LỖI MAX ~36)</span></th>
                                        <th class="py-3 px-2">RUNNER<br><span class="text-[8px] sm:text-[9px] font-normal text-slate-400">(QUỸ LỖI MAX ~18)</span></th>

                                <tbody>
                                    ${JOB_DATA.kpiScale.map(scale => `

                                                : scale.pv}
                                            </td>
                                            <td class="py-3 px-1 font-medium text-slate-600">
                                                ${scale.highlight === 'green' ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-[9px] sm:text-[10px] font-bold">${scale.runner}</span>` 
                                                : scale.highlight === 'red' ? `<span class="bg-red-50 text-red-600 px-2 py-1 rounded-full text-[9px] sm:text-[10px] font-bold">${scale.runner}</span>` 
                                                : scale.runner}
                                            </td>
                                            <td class="py-3 px-1 font-medium text-slate-600">
                                                ${scale.highlight === 'green' ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-[9px] sm:text-[10px] font-bold">${scale.tv}</span>` 
                                                : scale.highlight === 'red' ? `<span class="bg-red-50 text-red-600 px-2 py-1 rounded-full text-[9px] sm:text-[10px] font-bold">${scale.tv}</span>` 
                                                : scale.tv}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm border-l-4 border-l-red-500">
                    <h3 class="font-black text-slate-800 mb-4 flex items-center uppercase text-sm tracking-wide">
                        <i class="fa-solid fa-scale-balanced text-red-600 mr-2"></i> V. Nguyên tắc hậu kiểm & Audit
                    </h3>
                    <div class="space-y-3">
                        ${JOB_DATA.rules.map(rule => `
                            <div class="flex items-start text-sm text-slate-600">
                                <i class="fa-solid fa-circle text-[6px] text-slate-300 mt-2 mr-3 shrink-0"></i>
                                <p>${rule}</p>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm border-l-4 border-l-green-500">
                    <h3 class="font-black text-slate-800 mb-3 flex items-center uppercase text-sm tracking-wide">
                        <i class="fa-solid fa-award text-green-500 mr-2"></i> VI. Thâm niên & Tăng lương
                    </h3>
                    <div class="flex items-center space-x-3 mb-4">
                        <div class="text-green-600 font-black text-lg">${JOB_DATA.seniority.reward}</div>
                        <div class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold uppercase">${JOB_DATA.seniority.max}</div>
                    </div>
                    <div class="space-y-3">
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-tighter">Điều kiện xét duyệt:</p>
                        ${JOB_DATA.seniority.conditions.map(cond => `
                            <div class="flex items-start text-sm text-slate-600">
                                <i class="fa-solid fa-check text-green-500 mt-1 mr-3 shrink-0"></i>
                                <p>${cond}</p>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section class="bg-slate-800 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden mt-6">
                    <div class="absolute -right-6 -bottom-6 opacity-10 text-7xl"><i class="fa-solid fa-brain"></i></div>
                    <div class="relative z-10">
                        <h3 class="font-black mb-1 flex items-center uppercase text-sm tracking-wide">
                            Trợ Lý Quản Trị AI <span class="ml-2 text-xs animate-sparkle">✨</span>
                        </h3>
                        <p class="text-[10px] text-slate-300 mb-4 font-bold tracking-widest opacity-80 uppercase">Hỗ trợ riêng cho Giám sát</p>

                        <div class="space-y-3">
                            <select id="ai-task" class="w-full text-xs font-bold bg-white/10 border border-white/20 text-white rounded-xl p-3 outline-none focus:bg-white focus:text-slate-900 transition-all">
                                <option value="policy" class="text-slate-900">📖 Giải thích Logic Trừ Lỗi & KPI</option>
                                <option value="upsell" class="text-slate-900">⚖️ Kỹ năng chấn chỉnh nhân viên</option>
                                <option value="complaint" class="text-slate-900">🎭 Kịch bản xử lý khi bể ca</option>
                            </select>
                            
                            <textarea id="ai-input" rows="2" class="w-full text-xs bg-white/10 border border-white/20 text-white rounded-xl p-3 outline-none placeholder-slate-400 focus:bg-white focus:text-slate-900 transition-all" placeholder="Nhập câu hỏi tại đây..."></textarea>

                            <button onclick="askGemini()" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-black py-3 rounded-xl shadow-lg flex justify-center items-center transition-all active:scale-95">
                                <span id="ai-btn-text">Tư Vấn Ngay</span>
                                <span id="ai-loading" class="loader hidden ml-2 !border-t-white !border-white/30"></span>
                            </button>

                            <div id="ai-response-box" class="hidden mt-4 bg-black/20 rounded-xl p-4 border border-white/10 backdrop-blur-sm">
                                <p class="text-[9px] font-black uppercase mb-1 text-indigo-300">Gợi ý từ AI:</p>
                                <div id="ai-response-text" class="text-[11px] leading-relaxed italic text-white/90"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <footer class="pt-8 pb-4 text-center text-[10px] text-slate-400 font-medium">
                    <p>PHÊ DUYỆT BỞI BAN GIÁM ĐỐC</p>
                    <p class="mt-1 opacity-50">Hệ thống cẩm nang nhân sự nội bộ</p>
                    <p class="mt-3 text-indigo-400 italic font-bold leading-relaxed tracking-wider px-4">"Giám sát tốt không chỉ là người đi kiểm tra, mà là người điều phối được hệ thống và bắt lỗi đúng chỗ."</p>
                </footer>
            </main>
        `;

        root.innerHTML = html;
    }

    function toggleAccordion(id, btn) {
        const content = document.getElementById(id);
        const icon = btn.querySelector('.fa-chevron-down');
        content.classList.toggle('active');
        icon.classList.toggle('rotate-180');
    }

    /* AI GEMINI LOGIC */
    // ------------------------------------------------------------------------
    // ⚠️ LƯU Ý QUAN TRỌNG VỀ TRỢ LÝ AI (API KEY):
    // - Trong môi trường thử nghiệm (Preview) này: Trợ lý AI tự động hoạt động mà không cần điền key.
    // - KHI BẠN ĐƯA FILE NÀY LÊN WEB HOẶC ĐIỆN THOẠI (bên ngoài môi trường preview):
    //   Bạn BẮT BUỘC phải lấy API Key của Google Gemini và dán vào giữa 2 dấu ngoặc kép ở bên dưới.
    //   -> Lấy API Key (Miễn phí) tại đây: https://aistudio.google.com/app/apikey
    // ------------------------------------------------------------------------
    const apiKey = "AIzaSyDQpJY_QRxT_OdKlzTsg9YCVpSHFSGTtuY"; 

    async function askGemini() {
        const inputField = document.getElementById('ai-input');
        const taskType = document.getElementById('ai-task').value;
        const btnText = document.getElementById('ai-btn-text');
        const loading = document.getElementById('ai-loading');
        const responseBox = document.getElementById('ai-response-box');
        const responseText = document.getElementById('ai-response-text');

        const query = inputField.value.trim();
        if (!query) return;

        btnText.textContent = "Đang phân tích...";
        loading.classList.remove('hidden');
        responseBox.classList.add('hidden');

        let systemPrompt = `Bạn là Trợ lý AI Quản trị Nhà hàng, tư vấn cho Giám sát. Nội quy: ${JOB_DATA.aiConfig.policyContext}. `;
        if (taskType === 'policy') systemPrompt += "Giải thích một cách chuyên nghiệp, dễ hiểu về công thức A - (B x 2) - (C x 3). Định nghĩa rõ A, B, C là gì theo nội quy và nhấn mạnh điều kiện cực kỳ quan trọng: Lỗi A chỉ được tính khi ĐÃ TRỪ KPI nhân viên, TUYỆT ĐỐI không tính nếu chỉ nhắc miệng hay ghi khống.";
        else if (taskType === 'upsell') systemPrompt += "Gợi ý cách nhắc nhở nhân viên vi phạm kỷ luật (ví dụ: bấm điện thoại) vừa khéo léo vừa nghiêm khắc.";
        else systemPrompt += "Gợi ý cách điều phối cấp tốc khi nhà hàng bị quá tải (bể ca), khách đông mà thiếu nhân sự.";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: query }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                })
            });

            const data = await response.json();
            let result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Trợ lý đang bận xử lý dữ liệu khác. (Lưu ý: Nếu bạn đang chạy ứng dụng này bên ngoài, vui lòng kiểm tra lại xem bạn đã cấu hình biến apiKey trong code chưa).";
            responseText.innerHTML = result.replace(/\n/g, '<br>');
            responseBox.classList.remove('hidden');
        } catch (e) {
            responseText.innerHTML = "Lỗi kết nối AI. Vui lòng kiểm tra lại cấu hình API Key trong file code.";
            responseBox.classList.remove('hidden');
        } finally {
            btnText.textContent = "Tư Vấn Ngay";
            loading.classList.add('hidden');
        }
    }

    renderApp();
</script>
